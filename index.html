<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Summer Party 2026 - Ultra Fast Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .image-card:hover { transform: translateY(-4px); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); transition: 0.2s; }
        .video-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="text-slate-800 text-sm md:text-base">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass shadow-sm px-4 py-3">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
                <div class="bg-blue-600 p-2 rounded-2xl text-white shadow-lg">
                    <i data-lucide="sun"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-none text-slate-900 uppercase">Hana Summer Party 2026</h1>
                </div>
            </div>

            <div id="searchActions" class="flex items-center gap-3 w-full md:w-auto">
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleVisualSearch(event)">
                <button onclick="document.getElementById('imageInput').click()" 
                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full shadow-lg transition-all w-full justify-center active:scale-95">
                    <i data-lucide="camera"></i>
                    <span>ค้นหาจากรูปภาพ</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- API Setup Error -->
        <div id="setupGuide" class="hidden mb-10 p-8 bg-white border-2 border-red-100 rounded-[2.5rem] animate-in shadow-xl text-center md:text-left">
            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="bg-red-500 text-white p-6 rounded-3xl"><i data-lucide="shield-alert" class="w-12 h-12"></i></div>
                <div class="flex-1">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">API Restricted (403)</h2>
                    <p class="text-gray-600 mb-4">โปรดคัดลอกค่า Wildcard นี้ไปใส่ใน Google Console เพื่อปลดบล็อก:</p>
                    <code class="bg-slate-900 p-4 rounded-2xl block text-blue-400 font-mono text-xs break-all">*.usercontent.goog/*</code>
                </div>
            </div>
        </div>

        <!-- Search Status -->
        <div id="searchPreview" class="hidden mb-10 p-6 md:p-10 bg-white border border-blue-100 rounded-[3rem] shadow-xl animate-in text-center">
            <h3 class="text-blue-600 font-bold mb-6 flex items-center justify-center gap-2 uppercase tracking-widest text-xs">
                <i data-lucide="target" class="w-4 h-4"></i>
                <span>ผลการค้นหาที่ดีที่สุด 20 อันดับ</span>
            </h3>
            <div class="relative inline-block">
                <img id="targetPreviewImg" class="h-44 w-44 object-cover rounded-3xl shadow-2xl border-4 border-white" src="" alt="Target">
                <button onclick="resetSearch()" class="absolute -top-3 -right-3 bg-red-500 text-white p-2 rounded-full hover:bg-red-600 shadow-lg transition-all active:scale-90">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="searchStatusContainer" class="mt-6">
                <p id="searchStatus" class="text-xs text-blue-600 font-bold uppercase tracking-wider italic">กำลังเริ่มการวิเคราะห์ความคล้าย... 0%</p>
                <div class="w-48 h-1 bg-slate-100 mx-auto mt-3 rounded-full overflow-hidden">
                    <div id="searchProgressBar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Initial Loader -->
        <div id="mainLoader" class="flex flex-col items-center justify-center py-32">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-14 w-14 mb-6"></div>
            <p class="text-slate-400 text-sm font-medium animate-pulse uppercase tracking-widest">ดึงข้อมูลคลังภาพแบบรวดเร็วพิเศษ...</p>
        </div>

        <!-- Gallery -->
        <div id="galleryContainer" class="space-y-12 pb-32"></div>

    </main>

    <!-- Modal View -->
    <div id="imageModal" class="fixed inset-0 bg-slate-900/98 backdrop-blur-2xl z-[100] hidden items-center justify-center p-2 select-none">
        
        <!-- Close Button -->
        <button onclick="closeModal()" class="absolute top-4 right-4 md:top-8 md:right-8 bg-black/70 hover:bg-red-600 text-white p-5 rounded-full z-[120] transition-all active:scale-90 shadow-2xl border border-white/20">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <!-- Desktop Arrows -->
        <button id="prevBtn" onclick="navigateMedia(-1)" class="nav-btn absolute left-8 top-1/2 -translate-y-1/2 text-white p-5 rounded-full z-[105] hidden lg:block active:scale-95 transition-all">
            <i data-lucide="chevron-left" class="w-10 h-10"></i>
        </button>
        <button id="nextBtn" onclick="navigateMedia(1)" class="nav-btn absolute right-8 top-1/2 -translate-y-1/2 text-white p-5 rounded-full z-[105] hidden lg:block active:scale-95 transition-all">
            <i data-lucide="chevron-right" class="w-10 h-10"></i>
        </button>

        <div class="max-w-7xl w-full flex flex-col items-center gap-4 animate-in">
            <div id="modalContent" class="w-full flex justify-center items-center h-[65vh] md:h-[75vh]"></div>
            
            <!-- Mobile Bottom Nav -->
            <div class="flex lg:hidden gap-10 mt-1">
                 <button onclick="navigateMedia(-1)" class="bg-white/10 p-5 rounded-full text-white active:bg-blue-600 shadow-xl border border-white/5 transition-colors">
                    <i data-lucide="chevron-left" class="w-10 h-10"></i>
                </button>
                 <button onclick="navigateMedia(1)" class="bg-white/10 p-5 rounded-full text-white active:bg-blue-600 shadow-xl border border-white/5 transition-colors">
                    <i data-lucide="chevron-right" class="w-10 h-10"></i>
                </button>
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row justify-center gap-3 w-full px-6 max-w-lg">
                <a id="downloadBtn" href="#" download class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl flex items-center justify-center gap-3 shadow-xl font-bold active:scale-95 transition-all w-full">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span>ดาวน์โหลดรูปนี้</span>
                </a>
                <a id="driveBtn" href="#" target="_blank" class="bg-slate-700 hover:bg-slate-800 text-white px-8 py-3 rounded-2xl flex items-center justify-center gap-3 transition-all shadow-lg active:scale-95 w-full text-sm font-medium">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                    <span>ดูต้นฉบับบน Drive</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBnIUmU5oRM75p8OETC9fINXWJ3_TeFVFc';
        const ROOT_FOLDER = '1BSN7gxmPWYCAKJgA9aH4yNuERpTvs4uiX-B4';
        
        let net = null; 
        let allImagesForSearch = []; 
        let currentDisplayList = []; 
        let currentIndex = -1;
        let mediaEmbeddings = new Map(); 
        let isIndexing = false;
        
        // เพิ่มตัวแปรสำหรับเก็บข้อมูลโฟลเดอร์เพื่อนำมาจัดเรียง
        let allFolderSections = [];

        lucide.createIcons();

        // 1. Initial Load
        window.onload = async () => {
            try {
                await tf.setBackend('webgl');
                const modelTask = mobilenet.load({ version: 1, alpha: 0.25 });
                
                await fetchRecursive(ROOT_FOLDER, "Root");
                
                // --- จัดเรียงโฟลเดอร์และ Render ---
                // จัดเรียงให้โฟลเดอร์ที่มีวิดีโอ (hasVideo = true) ขึ้นมาอยู่ด้านบนสุด
                allFolderSections.sort((a, b) => {
                    if (a.hasVideo && !b.hasVideo) return -1;
                    if (!a.hasVideo && b.hasVideo) return 1;
                    return 0;
                });

                // กำหนดลิสต์เพื่อเอาไว้แสดงผล Modal Slider สำหรับภาพ
                if (allImagesForSearch.length > 0) currentDisplayList = allImagesForSearch;
                
                // Render ข้อมูลที่จัดเรียงเรียบร้อยแล้วทั้งหมด
                allFolderSections.forEach(section => {
                    renderFolderSection(section.title, section.items);
                });
                // ------------------------------------------

                net = await modelTask;
                document.getElementById('mainLoader').classList.add('hidden');
                
                if (allImagesForSearch.length > 0) {
                    startBackgroundIndexing();
                } else if (allFolderSections.length === 0) {
                    document.getElementById('galleryContainer').innerHTML = `<div class="text-center py-20 text-slate-400 font-medium italic">ไม่พบเนื้อหาในคลังสื่อ</div>`;
                }
                
            } catch (error) {
                if (error.message && error.message.includes("403")) {
                    document.getElementById('setupGuide').classList.remove('hidden');
                } else {
                    console.error(error);
                }
                document.getElementById('mainLoader').classList.add('hidden');
            }
        };

        async function fetchRecursive(folderId, folderName) {
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,webContentLink,thumbnailLink)&pageSize=1000&key=${API_KEY}`);
                const data = await res.json();
                const items = data.files || [];

                const subFolders = items.filter(i => i.mimeType === 'application/vnd.google-apps.folder');
                const imageFiles = items.filter(i => i.mimeType.includes('image/'));
                const videoFiles = items.filter(i => i.mimeType.includes('video/'));

                let cleanTitle = folderName.replace(/^Root\s*\/?\s*/, "") || "คลังภาพหลัก";
                const currentFolderItems = [];
                let hasVideo = false;

                // นำ Video ใส่เข้าไปก่อน (เพื่อให้แสดงขึ้นมาก่อนภาพในโฟลเดอร์เดียวกัน)
                if (videoFiles.length > 0) {
                    hasVideo = true; 
                    const mappedVideos = videoFiles.map(f => ({
                        id: f.id,
                        name: f.name,
                        mimeType: f.mimeType,
                        driveLink: `https://drive.google.com/file/d/${f.id}/view`,
                        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s600') : `https://via.placeholder.com/600x400?text=VIDEO`,
                        folderName: cleanTitle,
                        isVideo: true
                    }));
                    currentFolderItems.push(...mappedVideos);
                }

                if (imageFiles.length > 0) {
                    const mappedImages = imageFiles.map(f => ({
                        id: f.id,
                        name: f.name,
                        mimeType: f.mimeType,
                        driveLink: f.webContentLink,
                        url: `https://lh3.googleusercontent.com/d/${f.id}=w1600`,
                        thumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s400') : `https://lh3.googleusercontent.com/d/${f.id}=w400`,
                        embedThumb: f.thumbnailLink ? f.thumbnailLink.replace(/=s\d+/, '=s224') : `https://lh3.googleusercontent.com/d/${f.id}=w224`,
                        folderName: cleanTitle,
                        isVideo: false
                    }));
                    allImagesForSearch.push(...mappedImages);
                    currentFolderItems.push(...mappedImages);
                }

                // เก็บข้อมูลโฟลเดอร์ไว้เพื่อเตรียมนำไป Sort
                if (currentFolderItems.length > 0) {
                    allFolderSections.push({
                        title: cleanTitle,
                        items: currentFolderItems,
                        hasVideo: hasVideo
                    });
                }

                // ทำการค้นหาในโฟลเดอร์ย่อยแบบขนาน (Parallel)
                await Promise.all(subFolders.map(sub => fetchRecursive(sub.id, `${folderName} / ${sub.name}`)));
            } catch (e) { console.warn(e); }
        }

        // 2. Rendering
        function renderFolderSection(title, files) {
            const container = document.getElementById('galleryContainer');
            const section = document.createElement('section');
            section.className = 'animate-in mb-10';
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-5 px-3">
                    <h2 class="text-sm md:text-base font-bold text-slate-700 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="folder" class="w-5 h-5 text-blue-500"></i> ${title}
                    </h2>
                    <div class="h-px bg-slate-300 flex-1"></div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 px-2"></div>
            `;
            const grid = section.querySelector('.grid');
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'image-card bg-white rounded-2xl shadow-sm overflow-hidden cursor-pointer border-2 border-white hover:shadow-xl transition-all relative';
                div.onclick = () => {
                    if (file.isVideo) {
                        window.location.href = file.driveLink;
                    } else {
                        currentIndex = allImagesForSearch.findIndex(m => m.id === file.id);
                        currentDisplayList = allImagesForSearch;
                        openModal(file);
                    }
                };
                div.innerHTML = `
                    <div class="aspect-square bg-slate-50 relative overflow-hidden">
                        <img src="${file.thumb}" class="w-full h-full object-cover opacity-0 transition-opacity duration-300" onload="this.style.opacity='1'" crossorigin="anonymous" loading="lazy">
                        ${file.isVideo ? `
                            <div class="absolute inset-0 flex items-center justify-center video-overlay">
                                <div class="bg-white/20 p-4 rounded-full backdrop-blur-md border border-white/30 shadow-lg">
                                    <i data-lucide="play" class="text-white fill-white w-8 h-8"></i>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                grid.appendChild(div);
            });
            container.appendChild(section);
            lucide.createIcons();
        }

        // 3. AI Smart Indexing & Fast Search
        async function startBackgroundIndexing() {
            if (isIndexing || !net) return;
            isIndexing = true;
            for (let i = 0; i < allImagesForSearch.length; i++) {
                let item = allImagesForSearch[i];
                if (mediaEmbeddings.has(item.id)) continue;
                try {
                    const vector = await getImageEmbedding(item.embedThumb);
                    mediaEmbeddings.set(item.id, vector);
                } catch (e) {}
                
                // Allow UI to breathe
                if (i % 10 === 0) await tf.nextFrame();
            }
            isIndexing = false;
        }

        async function handleVisualSearch(event) {
            const file = event.target.files[0];
            if (!file || !net) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const previewImg = document.getElementById('targetPreviewImg');
                previewImg.src = e.target.result;
                document.getElementById('searchPreview').classList.remove('hidden');
                document.getElementById('galleryContainer').classList.add('opacity-20');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                const startTime = performance.now();
                
                setTimeout(async () => {
                    const targetVector = await tf.tidy(() => {
                        return net.infer(previewImg, true).dataSync();
                    });

                    const results = [];
                    const total = allImagesForSearch.length;
                    
                    for (let i = 0; i < total; i++) {
                        let item = allImagesForSearch[i];
                        let featureVector = mediaEmbeddings.get(item.id);
                        
                        if (!featureVector) {
                            try {
                                featureVector = await getImageEmbedding(item.embedThumb);
                                mediaEmbeddings.set(item.id, featureVector);
                            } catch (e) { continue; }
                        }
                        
                        results.push({ ...item, score: cosineSimilarity(targetVector, featureVector) });
                        
                        // Ultra fast UI Update
                        if (i % 15 === 0) {
                            const p = Math.round((i / total) * 100);
                            document.getElementById('searchStatus').innerText = `กำลังประมวลผล... ${p}%`;
                            document.getElementById('searchProgressBar').style.width = p + '%';
                            await tf.nextFrame();
                        }
                    }

                    results.sort((a, b) => b.score - a.score);
                    const top20 = results.slice(0, 20);
                    const duration = ((performance.now() - startTime) / 1000).toFixed(2);
                    
                    currentDisplayList = top20;
                    displaySearchResults(top20, duration);
                }, 50);
            };
            reader.readAsDataURL(file);
        }

        function displaySearchResults(results, time) {
            const container = document.getElementById('galleryContainer');
            container.classList.remove('opacity-20');
            container.innerHTML = `
                <div class="animate-in px-2">
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="text-xl font-bold text-blue-600 italic">🎯 20 รูปที่ใกล้เคียงที่สุด</h2>
                        <div class="h-1 bg-blue-100 flex-1 rounded-full"></div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5">
                        ${results.map((f, idx) => `
                            <div class="image-card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer border-4 border-white flex flex-col" onclick='openSearchModal(${idx})'>
                                <div class="aspect-square bg-slate-100"><img src="${f.thumb}" class="w-full h-full object-cover"></div>
                                <div class="p-3 text-center bg-white border-t border-slate-100">
                                    <div class="text-blue-600 font-extrabold text-sm">${Math.round(f.score * 100)}% Match</div>
                                    <div class="text-[10px] text-slate-400 font-medium uppercase mt-1">Found in ${time}s</div>
                                    <div class="text-xs text-slate-600 font-bold truncate mt-1.5">${f.folderName}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('searchStatus').innerText = "การค้นหาเสร็จสมบูรณ์!";
            document.getElementById('searchProgressBar').style.width = '100%';
        }

        // 4. Utils
        async function getImageEmbedding(url) {
            return new Promise((resolve, reject) => {
                const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
                img.onload = () => {
                    try {
                        const vector = tf.tidy(() => net.infer(img, true).dataSync());
                        resolve(vector);
                    } catch (e) { reject(e); }
                };
                img.onerror = reject;
            });
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += (vecA[i] * vecB[i]);
                mA += (vecA[i] * vecA[i]);
                mB += (vecB[i] * vecB[i]);
            }
            return dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        function openModal(file) {
            const modal = document.getElementById('imageModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = '<div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>';
            
            const img = new Image();
            img.src = file.url;
            img.className = "max-w-full max-h-[65vh] md:max-h-[80vh] rounded-2xl shadow-2xl animate-in object-contain border-2 border-white/5 shadow-black/50";
            img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
            
            document.getElementById('downloadBtn').href = `https://drive.google.com/uc?export=download&id=${file.id}`;
            document.getElementById('driveBtn').href = `https://drive.google.com/file/d/${file.id}/view`;
            modal.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            updateNavButtons();
        }

        function openSearchModal(idx) { currentIndex = idx; openModal(currentDisplayList[idx]); }
        function navigateMedia(step) {
            if (currentIndex + step >= 0 && currentIndex + step < currentDisplayList.length) {
                currentIndex += step;
                openModal(currentDisplayList[currentIndex]);
            }
        }
        function updateNavButtons() {
            document.getElementById('prevBtn').style.opacity = (currentIndex > 0) ? '1' : '0.2';
            document.getElementById('nextBtn').style.opacity = (currentIndex < currentDisplayList.length - 1) ? '1' : '0.2';
        }
        function closeModal() { document.getElementById('imageModal').classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }
        function resetSearch() { window.location.reload(); }
    </script>
</body>
</html>
